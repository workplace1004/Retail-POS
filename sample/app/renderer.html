<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline' 'self'" />
  <title>Worldline C-TEP Electron TestTool</title>
  <style>
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #f4f5f7; color: #111827; }
    header { background: #111827; color: white; padding: 16px 22px; }
    h1 { margin: 0; font-size: 21px; }
    .sub { opacity: .8; margin-top: 4px; font-size: 13px; }
    main { padding: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    .wide { grid-column: 1 / -1; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    button { border: 0; border-radius: 9px; padding: 11px 14px; margin: 4px 5px 4px 0; background: #111827; color: white; cursor: pointer; font-weight: 600; }
    button:hover { filter: brightness(1.1); }
    button.secondary { background: #4b5563; }
    button.green { background: #15803d; }
    button.red { background: #b91c1c; }
    label { display: block; font-size: 13px; margin-top: 10px; color: #374151; }
    input { width: 220px; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    pre { background: #0b1020; color: #d1fae5; padding: 12px; border-radius: 10px; min-height: 110px; white-space: pre-wrap; overflow: auto; max-height: 290px; }
    #log { min-height: 230px; max-height: 330px; }
    .ok { color: #15803d; font-weight: 700; }
    .bad { color: #b91c1c; font-weight: 700; }
    .pill { display: inline-block; border-radius: 999px; padding: 5px 10px; background: #e5e7eb; margin: 2px; font-size: 13px; }
    .row { margin-bottom: 10px; }
  </style>
</head>
<body>
<header>
  <h1>Worldline C-TEP Electron TestTool</h1>
  <div class="sub">Terminal → PC-IP:9000 | Electron/POS → lokale bridge HTTP:3210 | RX5000 getest op connectie</div>
</header>
<main>
  <section class="card">
    <h2>Bridge / Terminal status</h2>
    <div class="row">
      <button id="btnStart">Start bridge</button>
      <button id="btnStop" class="secondary">Stop bridge</button>
      <button id="btnPing" class="secondary">Ping</button>
      <button id="btnStatus" class="green">Status opvragen</button>
    </div>
    <div id="badges"></div>
    <pre id="statusOut">Nog geen status.</pre>
  </section>

  <section class="card">
    <h2>Betaling testen</h2>
    <label>Bedrag in euro</label>
    <input id="amount" type="number" step="0.01" value="1.00" />
    <label>Referentie</label>
    <input id="reference" value="POS-TEST-001" />
    <div class="row" style="margin-top:12px">
      <button id="btnSale" class="green">Start betaling</button>
      <button id="btnCancel" class="red">Cancel / reset</button>
      <button id="btnTx" class="secondary">Laatste transactie</button>
    </div>
    <pre id="txOut">Nog geen transactie.</pre>
  </section>

  <section class="card wide">
    <h2>Live log</h2>
    <pre id="log"></pre>
  </section>
</main>
<script src="renderer.js"></script>
</body>
</html>
