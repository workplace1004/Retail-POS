<svg xmlns="http://www.w3.org/2000/svg" width="190" height="227" viewBox="0 0 190 227" fill="none">
  <defs>
    <radialGradient id="petalGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(95 104) rotate(90) scale(62)">
      <stop offset="0" stop-color="#FFE8F5"/>
      <stop offset="1" stop-color="#D67AB1"/>
    </radialGradient>
    <radialGradient id="leafGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(95 104) rotate(90) scale(68)">
      <stop offset="0" stop-color="#86D9A5"/>
      <stop offset="1" stop-color="#2E8B57"/>
    </radialGradient>
    <radialGradient id="potRimGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(95 158) rotate(90) scale(40)">
      <stop offset="0" stop-color="#EBC9A5"/>
      <stop offset="1" stop-color="#B7773F"/>
    </radialGradient>
    <radialGradient id="potInnerGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(95 158) rotate(90) scale(27)">
      <stop offset="0" stop-color="#7A4A25"/>
      <stop offset="1" stop-color="#4E2F16"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="95" cy="179" rx="42" ry="15" fill="#000000" opacity="0.15"/>

    <!-- Decorative leaf ring -->
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(0 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(45 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(90 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(135 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(180 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(225 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(270 95 104)"/>
    <ellipse cx="95" cy="60" rx="15" ry="28" fill="url(#leafGradient)" transform="rotate(315 95 104)"/>

    <!-- Flower petals -->
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(22.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(67.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(112.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(157.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(202.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(247.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(292.5 95 104)"/>
    <ellipse cx="95" cy="58" rx="12" ry="24" fill="url(#petalGradient)" transform="rotate(337.5 95 104)"/>

    <!-- Flower center -->
    <circle cx="95" cy="104" r="19" fill="#FFD76B"/>
    <circle cx="95" cy="104" r="9" fill="#F7A928"/>
  </g>
</svg>
